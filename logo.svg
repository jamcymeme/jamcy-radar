<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060d18;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="240" cy="220" r="155"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" rx="40" fill="url(#bgGrad)"/>

  <!-- Radar fill sweep -->
  <path d="M240 220 L395 220 A155 155 0 0 0 240 65 Z" fill="url(#radarGrad)" clip-path="url(#circle-clip)"/>

  <!-- Radar circles -->
  <circle cx="240" cy="220" r="155" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.35"/>
  <circle cx="240" cy="220" r="110" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.25"/>
  <circle cx="240" cy="220" r="65" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <circle cx="240" cy="220" r="25" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- Radar crosshairs -->
  <line x1="85" y1="220" x2="395" y2="220" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="65" x2="240" y2="375" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

  <!-- Radar sweep arm -->
  <line x1="240" y1="220" x2="395" y2="220" stroke="#00ff88" stroke-width="2" opacity="0.9" filter="url(#glow)"/>

  <!-- Radar sweep arc hint -->
  <path d="M395 220 A155 155 0 0 0 240 65" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Blips -->
  <circle cx="330" cy="155" r="5" fill="#00ff88" filter="url(#strongGlow)" opacity="0.9"/>
  <circle cx="180" cy="175" r="3.5" fill="#ffcc00" filter="url(#glow)" opacity="0.85"/>
  <circle cx="290" cy="285" r="4" fill="#ff4444" filter="url(#glow)" opacity="0.8"/>
  <circle cx="155" cy="255" r="3" fill="#00ff88" filter="url(#glow)" opacity="0.6"/>

  <!-- Center dot -->
  <circle cx="240" cy="220" r="5" fill="#00ff88" filter="url(#strongGlow)"/>

  <!-- JAMCY text -->
  <text x="240" y="418" font-family="'Arial Black', 'Impact', sans-serif" font-size="54" font-weight="900" text-anchor="middle" letter-spacing="8" fill="#ffffff" filter="url(#glow)">JAMCY</text>

  <!-- RADAR subtext -->
  <text x="240" y="448" font-family="'Arial', sans-serif" font-size="18" font-weight="400" text-anchor="middle" letter-spacing="12" fill="#00ff88" opacity="0.85">RADAR</text>

  <!-- Top accent line -->
  <line x1="120" y1="406" x2="360" y2="406" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
</svg>
